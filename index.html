<!DOCTYPE html>
<html lang="kn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeMacha Pro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007acc">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1e1e1e; color: #fff; font-family: sans-serif; overflow: hidden; }
    #header { background: #007acc; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
    #header h1 { font-size: 18px; }
    #header button { background: #1e1e1e; color: #fff; border: none; padding: 6px 10px; border-radius: 4px; margin-left: 5px; font-size: 12px; }
    #editor { height: calc(100vh - 50px); width: 100%; }
    #runBtn {
      position: fixed; bottom: 20px; right: 20px; background: #007acc;
      border: none; color: #fff; border-radius: 50%; width: 56px; height: 56px;
      font-size: 24px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); z-index: 999;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>CodeMacha Pro</h1>
    <div>
      <button onclick="selectAllCode()">☰ All</button>
      <button onclick="copyCode()">📋 Copy</button>
      <button onclick="saveFile()">💾</button>
      <button onclick="openFile()">📁</button>
    </div>
  </div>

  <div id="editor"></div>
  <button id="runBtn" onclick="runCode()">▶</button>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script>
    let editor;
    require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' }});
    require(['vs/editor/editor.main'], function () {
      editor = monaco.editor.create(document.getElementById('editor'), {
        value: '<!-- CodeMacha ಗೆ Welcome ಮಚ್ಚಾ -->\n<h1>Hello World</h1>\n<style>\n h1 { color: #007acc; }\n</style>\n<script>\n console.log("Run ಮಾಡಿ ನೋಡು")\n<\/script>',
        language: 'html',
        theme: 'vs-dark',
        automaticLayout: true,
        minimap: { enabled: false },
        fontSize: 14,
        wordWrap: 'on',
        contextmenu: true,
        selectOnLineNumbers: true,
        domReadOnly: false,
        readOnly: false
      });
    });

    function selectAllCode() {
      const range = editor.getModel().getFullModelRange();
      editor.setSelection(range);
      editor.focus();
    }

    function copyCode() {
      const code = editor.getValue();
      navigator.clipboard.writeText(code).then(() => {
        alert('Copy ಆಯ್ತು ಮಚ್ಚಾ! 📋');
      });
    }

    function runCode() {
      const code = editor.getValue();
      const win = window.open();
      win.document.open();
      win.document.write(code);
      win.document.close();
    }

    function saveFile() {
      const code = editor.getValue();
      const blob = new Blob([code], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'index.html';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function openFile() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.html,.css,.js,.txt,.json,.md';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          editor.setValue(reader.result);
          let ext = file.name.split('.').pop().toLowerCase();
          let langMap = { 'js': 'javascript', 'css': 'css', 'html': 'html', 'json': 'json', 'md': 'markdown', 'txt': 'plaintext' };
          monaco.editor.setModelLanguage(editor.getModel(), langMap[ext] || 'plaintext');
        };
        reader.readAsText(file);
      };
      input.click();
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
